name: Deploy Mini Heroku

on:
  push:
    branches:
      - main
      - dev/**
      - feat/**
  workflow_dispatch: # Allows manual triggering

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.25.6"

      - name: Test Controller
        working-directory: controller
        run: go test -v ./...

      - name: Test CLI
        working-directory: cli
        run: go test -v ./...

  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    needs: test # Only run if tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.25.6"
          cache: true
          cache-dependency-path: |
            controller/go.sum
            cli/go.sum

      - name: Build Controller
        working-directory: controller
        run: GOOS=linux GOARCH=amd64 go build -o controller-linux -v

      - name: Upload Controller Artifact
        uses: actions/upload-artifact@v4
        with:
          name: controller-binary
          path: controller/controller-linux
          retention-days: 1

  deploy:
    name: Deploy to Private VM via VPN
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download Controller Artifact
        uses: actions/download-artifact@v4
        with:
          name: controller-binary

      # ----------------------------- Setup WireGuard -----------------------------
      - name: Setup WireGuard VPN
        uses: egor-tensin/setup-wireguard@v1
        with:
          endpoint: ${{ secrets.WG_SERVER_ENDPOINT }}
          endpoint_public_key: ${{ secrets.WG_SERVER_PUBLIC_KEY }}
          private_key: ${{ secrets.WG_PRIVATE_KEY }}
          ips: "50.50.50.7/32"
          allowed_ips: "10.30.0.0/20,10.30.16.0/20"

      # ----------------------------- Check WireGuard Connection -----------------------------
      - name: Check WireGuard
        run: sudo wg

      # ----------------------------- Test SSH Connectivity -----------------------------
      - name: Test SSH Connectivity
        uses: appleboy/ssh-action@v1
        with:
          host: 10.30.20.33
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "Connected via VPN"
            whoami

      # ----------------------------- Copy Binary to VM -----------------------------
      - name: Copy Controller Binary to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 10.30.20.33
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "controller-linux"
          target: "/tmp"


      # ----------------------------- Deploy and Restart Service -----------------------------
      - name: Deploy and Restart Service
        uses: appleboy/ssh-action@v1
        with:
          host: 10.30.20.33
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "=== Starting Deployment ==="

            sudo systemctl stop mini-heroku || true

            if [ -f /opt/mini-heroku/bin/controller ]; then
              sudo cp /opt/mini-heroku/bin/controller \
                /opt/mini-heroku/bin/controller.backup.$(date +%Y%m%d-%H%M%S)
            fi

            sudo mv /tmp/controller-linux /opt/mini-heroku/bin/controller
            sudo chown venkidesh:venkidesh /opt/mini-heroku/bin/controller
            sudo chmod +x /opt/mini-heroku/bin/controller

            sudo systemctl daemon-reload
            sudo systemctl restart mini-heroku

            echo "=== Deployment Complete ==="